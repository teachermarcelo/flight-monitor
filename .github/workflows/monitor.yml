name: Flight Monitor - SerpApi Real Data

on:
  schedule:
    # Roda 1 vez por dia às 09:00 UTC (aprox. 06:00 no horário de Brasília)
    # Formato: Minuto Hora Dia Mês DiaSemana
    - cron: '0 9 * * *'
  
  # Permite rodar manualmente pelo botão "Run workflow" no GitHub
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flight Monitor with Real Data
        env:
          # Chave REAL da SerpApi (Google Flights)
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          
          # Credenciais do Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          
          # Configuração de sensibilidade de alerta (opcional)
          MIN_PRICE_DROP_PERCENT: 15
        run: |
          echo " Iniciando monitoramento com DADOS REAIS (SerpApi)..."
          echo " Data: $(date)"
          echo "️ Lembre-se: Rodando 1x ao dia para economizar créditos da API."
          cd src
          python main.py
