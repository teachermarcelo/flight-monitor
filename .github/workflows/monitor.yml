name: Flight Monitor

on:
  schedule:
    # Roda a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  
  # Permite rodar manualmente pela interface do Github
  workflow_dispatch:

jobs:
  monitor-flights:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run flight monitor
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SABRE_CLIENT_ID: ${{ secrets.SABRE_CLIENT_ID }}
SABRE_CLIENT_SECRET: ${{ secrets.SABRE_CLIENT_SECRET }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MIN_PRICE_DROP_PERCENT: ${{ vars.MIN_PRICE_DROP_PERCENT }}
      run: |
        cd src
        python main.py
