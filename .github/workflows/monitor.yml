name: Flight Monitor - High Frequency

on:
  schedule:
    # Roda a cada 2 horas (00:00, 02:00, 04:00, etc. UTC)
    # UTC -3h (Brasília) seria: 21:00, 23:00, 01:00, 03:00...
    - cron: '0 */2 * * *'
  
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flight Monitor
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Iniciando varredura intensa..."
          cd src
          python main.py
